<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<title>September Notes 2025</title>

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  font-family:'Segoe Script','Brush Script MT',cursive;

  background:#ffd6e8;

  min-height:100vh;

  display:flex;
  justify-content:center;
  align-items:flex-start;

  padding:20px;
}

/* Main Container */

.calendar-container{

  background:white;

  width:100%;
  max-width:520px;

  border-radius:25px;

  padding:25px;

  box-shadow:0 6px 18px rgba(0,0,0,0.25);
}

/* Title */

h1{
  text-align:center;
  font-size:32px;
  margin-bottom:20px;
}

/* Weekdays */

.weekdays{
  display:grid;
  grid-template-columns:repeat(7,1fr);

  text-align:center;

  margin-bottom:10px;

  color:#555;

  font-size:15px;
}

/* Calendar Grid */

.calendar{
  display:grid;
  grid-template-columns:repeat(7,1fr);

  gap:8px;
}

/* Day Box */

.day{
  background:#ffe3f1;

  border-radius:12px;

  padding:15px 0;

  text-align:center;

  cursor:pointer;

  transition:0.2s;

  font-size:20px;

  border:2px solid transparent;
}

.day:hover{
  background:#ffbcd6;
  border-color:#ff98c2;
}

/* Modal Background */

.modal{

  position:fixed;

  inset:0;

  background:rgba(0,0,0,0.55);

  display:none;

  justify-content:center;
  align-items:center;

  padding:20px;

  z-index:999;
}

/* Modal Box */

.modal-content{

  background:white;

  width:min(90%, 420px);

  border-radius:24px;

  padding:28px;

  text-align:center;

  box-shadow:0 8px 25px rgba(0,0,0,0.25);

  animation:pop .25s ease;

  display:flex;
  flex-direction:column;
  align-items:center;
}

/* Popup Animation */

@keyframes pop{

  from{
    transform:scale(.85);
    opacity:0;
  }

  to{
    transform:scale(1);
    opacity:1;
  }
}

/* Modal Title */

#modalTitle{
  font-size:34px;
  margin-bottom:12px;
}

/* Note Text */

#noteText{
  font-size:22px;

  line-height:1.5;

  margin-bottom:22px;

  text-align:center;

  word-break:break-word;
}

/* Button */

button{

  border:none;

  background:pink;

  padding:12px 28px;

  border-radius:12px;

  cursor:pointer;

  font-size:18px;

  transition:.2s;
}

button:hover{
  background:#ff9ec5;
}

/* 📱 Mobile Responsive */

@media (max-width:500px){

  body{
    padding:12px;
  }

  .calendar-container{
    padding:18px;
    border-radius:20px;
  }

  h1{
    font-size:24px;
  }

  .weekdays{
    font-size:12px;
  }

  .day{
    font-size:16px;
    padding:12px 0;
  }

  .modal-content{
    width:100%;
    max-width:340px;

    padding:22px 18px;

    border-radius:20px;
  }

  #modalTitle{
    font-size:26px;
  }

  #noteText{
    font-size:18px;
  }

  button{
    width:100%;
    max-width:170px;
  }
}

</style>
</head>

<body>

<div class="calendar-container">

  <h1>September Notes 2025</h1>

  <div class="weekdays">
    <div>Sun</div>
    <div>Mon</div>
    <div>Tue</div>
    <div>Wed</div>
    <div>Thu</div>
    <div>Fri</div>
    <div>Sat</div>
  </div>

  <div class="calendar" id="calendar"></div>

</div>

<!-- Modal -->

<div class="modal" id="noteModal">

  <div class="modal-content">

    <h2 id="modalTitle"></h2>

    <p id="noteText"></p>

    <button onclick="closeModal()">
      Close
    </button>

  </div>

</div>

<script>

const calendar = document.getElementById("calendar");

/* Notes */

const messages = {

  1:"unknown",
  2:"unknown",
  3:"unknown",
  4:"unknown",
  5:"unknown",
  6:"unknown",
  7:"unknown",
  8:"unknown",
  9:"unknown",
  10:"unknown",
  11:"unknown",
  12:"unknown",
  13:"unknown",
  14:"unknown",
  15:"unknown",
  16:"unknown",
  17:"unknown",
  18:"unknown",
  19:"unknown",
  20:"unknown",
  21:"unknown",
  22:"unknown",
  23:"unknown",
  24:"unknown",
  25:"unknown",
  26:"unknown",
  27:"unknown",
  28:"unknown",
  29:"unknown",
  30:"unknown"

};

/* September 2025 starts Monday */

const emptyStartCells = 1;

/* Empty Spaces */

for(let i=0; i<emptyStartCells; i++){

  const empty = document.createElement("div");

  calendar.appendChild(empty);
}

/* Create Days */

for(let i=1; i<=30; i++){

  const day = document.createElement("div");

  day.classList.add("day");

  day.textContent = i;

  day.onclick = () => openNote(i);

  calendar.appendChild(day);
}

/* Open Modal */

function openNote(day){

  document.getElementById("modalTitle").textContent =
    `September ${day}`;

  document.getElementById("noteText").textContent =
    messages[day] || "(No message)";

  document.getElementById("noteModal").style.display = "flex";
}

/* Close Modal */

function closeModal(){

  document.getElementById("noteModal").style.display = "none";
}

/* Close when clicking outside */

window.onclick = function(event){

  const modal = document.getElementById("noteModal");

  if(event.target === modal){

    closeModal();
  }
}

</script>

</body>
</html>
